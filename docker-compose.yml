# Self-hosted Applire — pulls pre-built images from GHCR.
#
# Quick start (no git clone required):
#   curl -O https://raw.githubusercontent.com/tobias-rosenbaum/Applire/main/docker-compose.yml
#   curl -O https://raw.githubusercontent.com/tobias-rosenbaum/Applire/main/.env.example
#   cp .env.example .env        # set LLM_PROVIDER and matching API key
#   docker compose up -d
#   docker compose exec backend alembic upgrade head
#
# To update: docker compose pull && docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: applire
      POSTGRES_PASSWORD: applire
      POSTGRES_DB: applire
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applire"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/tobias-rosenbaum/applire-backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://applire:applire@postgres:5432/applire
    env_file:
      - path: .env
        required: false
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: ghcr.io/tobias-rosenbaum/applire-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

  ollama:
    image: ollama/ollama
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Retention worker — daily GDPR TTL enforcement (ADR 005).
  retention:
    image: ghcr.io/tobias-rosenbaum/applire-backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://applire:applire@postgres:5432/applire
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "while true; do python -m applire.retention; sleep 86400; done"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # MCP server — stdio transport for agent integration (ADR 010).
  # For actual agent use, launch directly: python -m applire.mcp
  # See docs/mcp.md for Claude Desktop / Cursor configuration.
  mcp:
    image: ghcr.io/tobias-rosenbaum/applire-backend:latest
    profiles: [mcp]
    environment:
      DATABASE_URL: postgresql+asyncpg://applire:applire@postgres:5432/applire
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m applire.mcp
    stdin_open: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  ollama_data:

configs:
  nginx_conf:
    content: |
      server {
          listen 80;

          location /api/ {
              proxy_pass http://backend:8000;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              client_max_body_size 20M;
              proxy_read_timeout ${NGINX_PROXY_TIMEOUT:-300}s;
              proxy_send_timeout ${NGINX_PROXY_TIMEOUT:-300}s;
          }

          location /static/ {
              proxy_pass http://backend:8000;
              proxy_set_header Host $$host;
          }

          location /health {
              proxy_pass http://backend:8000;
              proxy_set_header Host $$host;
          }

          location / {
              proxy_pass http://frontend:3000;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }
