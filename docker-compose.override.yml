# Development overrides — auto-applied by Docker Compose when present alongside docker-compose.yml.
# Builds images from source, mounts code for hot-reload, and adds nginx at port 80.
# Developers: cp .env.example .env  (fill in real API keys)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app:z
    command: uvicorn applire.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
      - /app/.next

  retention:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app:z

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app:z

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    environment:
      NGINX_PROXY_TIMEOUT: "${NGINX_PROXY_TIMEOUT:-300}"
    volumes:
      - ./nginx/dev.conf.template:/etc/nginx/templates/default.conf.template:ro,z
    depends_on:
      - backend
      - frontend
