# CI override — swap .env.dev for .env.ci (no real secrets required).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build
#
# This file only overrides the env_file on services that carry it.
# All other configuration is inherited from docker-compose.yml.

services:
  backend:
    env_file:
      - .env.ci

  retention:
    env_file:
      - .env.ci

  mcp:
    env_file:
      - .env.ci
