name: Test Suite

on:
  push:
    branches: [ main, develop, sprint-4 ]
  pull_request:
    branches: [ main, develop, sprint-4 ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock requests

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: backend
        run: |
          pytest tests/unit/ \
            --cov=apliqa \
            --cov-report=term-missing \
            --cov-report=html:backend/htmlcov \
            --cov-fail-under=70 \
            --junitxml=backend/test-results.xml \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/htmlcov/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: backend/test-results.xml
          retention-days: 30

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Unit Tests
          path: backend/test-results.xml
          reporter: java-junit
          fail-on-error: false

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-mock requests

      - name: Start Docker services
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for backend..."
          timeout 180 bash -c 'until curl -sf http://localhost:8001/health; do sleep 2; done'
          echo "Backend ready."

      - name: Run database migrations
        run: docker compose exec -T backend python -m alembic upgrade head

      - name: Run integration tests
        env:
          PYTHONPATH: backend
          CI: true
        run: |
          pytest tests/test_iter*.py \
            --junitxml=test-results.xml \
            -v \
            --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: test-results.xml
          retention-days: 30

      - name: Publish integration test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Integration Tests
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down Docker services
        if: always()
        run: docker compose down -v

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start Docker services
        run: docker compose up -d --build

      - name: Wait for application to be ready
        run: |
          echo "Waiting for backend..."
          timeout 180 bash -c 'until curl -sf http://localhost:8001/health; do sleep 2; done'
          echo "Backend ready."
          echo "Waiting for frontend..."
          timeout 180 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'
          echo "Frontend ready."

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 30

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down Docker services
        if: always()
        run: docker compose down -v

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, e2e-tests]
    if: always()

    steps:
      - name: Generate test summary
        run: |
          echo "## 🧪 Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Unit Tests | ${{ needs.backend-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Integration Tests | ${{ needs.backend-integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.backend-unit-tests.result }}" != "success" ] || \
             [ "${{ needs.backend-integration-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "❌ **One or more test suites failed.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const unit = '${{ needs.backend-unit-tests.result }}';
            const integration = '${{ needs.backend-integration-tests.result }}';
            const e2e = '${{ needs.e2e-tests.result }}';
            const allPassed = unit === 'success' && integration === 'success' && e2e === 'success';

            const body = allPassed
              ? '✅ **All tests passed!** This PR is ready to merge.'
              : [
                  '❌ **Test failures detected**\n',
                  '| Suite | Result |',
                  '|-------|--------|',
                  `| Backend Unit | ${unit} |`,
                  `| Backend Integration | ${integration} |`,
                  `| E2E (Playwright) | ${e2e} |`,
                  '\nCheck the **Actions** tab for details and download artifacts for full reports.',
                ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
