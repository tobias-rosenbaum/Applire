name: Test Suite

on:
  push:
    branches: [ main, develop, sprint-4 ]
  pull_request:
    branches: [ main, develop, sprint-4 ]

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock
      
      - name: Run unit tests with coverage
        working-directory: backend
        run: |
          pytest tests/unit/ \
            --cov=apliqa \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=70 \
            --junitxml=test-results.xml \
            -v
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/htmlcov/
          retention-days: 30
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: backend/test-results.xml
          retention-days: 30
      
      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Unit Tests
          path: backend/test-results.xml
          reporter: 'java-junit'
          fail-on-error: false

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock
      
      - name: Start Docker services
        working-directory: Solution
        run: |
          docker-compose up -d --build
      
      - name: Wait for services to be healthy
        working-directory: Solution
        run: |
          echo "Waiting for backend to be ready..."
          timeout 180 bash -c 'until curl -f http://localhost:8001/health; do sleep 2; done'
          echo "Backend is ready!"
      
      - name: Run integration tests
        working-directory: Solution
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            --junitxml=test-results.xml \
            -v \
            --tb=short
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: test-results.xml
          retention-days: 30
      
      - name: Publish integration test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Integration Tests
          path: test-results.xml
          reporter: 'java-junit'
          fail-on-error: false
      
      - name: Show Docker logs on failure
        if: failure()
        working-directory: Solution
        run: |
          docker-compose logs
      
      - name: Tear down Docker services
        if: always()
        working-directory: Solution
        run: |
          docker-compose down -v

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install Node.js dependencies
        working-directory: frontend
        run: |
          npm ci
      
      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium
      
      - name: Start Docker services
        working-directory: Solution
        run: |
          docker-compose up -d --build
      
      - name: Wait for application to be ready
        working-directory: Solution
        run: |
          echo "Waiting for backend to be ready..."
          timeout 180 bash -c 'until curl -f http://localhost:8001/health; do sleep 2; done'
          echo "Backend is ready!"
          echo "Waiting for frontend to be ready..."
          timeout 180 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'
          echo "Frontend is ready!"
      
      - name: Run Playwright E2E tests
        working-directory: frontend
        run: |
          npx playwright test
        env:
          CI: true
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
      
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 30
      
      - name: Show Docker logs on failure
        if: failure()
        working-directory: Solution
        run: |
          docker-compose logs
      
      - name: Tear down Docker services
        if: always()
        working-directory: Solution
        run: |
          docker-compose down -v

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, e2e-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all test results
        if: always()
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts
      
      - name: Generate test summary
        if: always()
        run: |
          echo "## 🧪 Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Unit Tests | ${{ needs.backend-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Integration Tests | ${{ needs.backend-integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.backend-unit-tests.result }}" != "success" ] || \
             [ "${{ needs.backend-integration-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "❌ **Test suite failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Check the annotations above for specific test failures" >> $GITHUB_STEP_SUMMARY
            echo "2. Review the PR comments for detailed error messages" >> $GITHUB_STEP_SUMMARY
            echo "3. Download artifacts for full test reports" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment on PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Check if tests failed
            const unitTestsResult = '${{ needs.backend-unit-tests.result }}';
            const integrationTestsResult = '${{ needs.backend-integration-tests.result }}';
            const e2eTestsResult = '${{ needs.e2e-tests.result }}';
            
            const allPassed = unitTestsResult === 'success' && 
                             integrationTestsResult === 'success' && 
                             e2eTestsResult === 'success';
            
            if (allPassed) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ **All tests passed!** This PR is ready to merge.'
              });
            } else {
              let failureDetails = '❌ **Test failures detected**\n\n';
              failureDetails += '**Failed components:**\n';
              
              if (unitTestsResult !== 'success') {
                failureDetails += `- Backend Unit Tests: ${unitTestsResult}\n`;
              }
              if (integrationTestsResult !== 'success') {
                failureDetails += `- Backend Integration Tests: ${integrationTestsResult}\n`;
              }
              if (e2eTestsResult !== 'success') {
                failureDetails += `- E2E Tests: ${e2eTestsResult}\n`;
              }
              
              failureDetails += '\n**What to do:**\n';
              failureDetails += '1. Check the **Annotations** tab above for specific test failures with file locations\n';
              failureDetails += '2. Review the **Checks** section for detailed error messages\n';
              failureDetails += '3. Download test artifacts for full reports\n';
              failureDetails += '4. Fix the issues and push again\n';
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: failureDetails
              });
            }
