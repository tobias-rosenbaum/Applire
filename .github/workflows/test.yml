name: Test Suite

on:
  push:
  pull_request:

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock requests

      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=backend pytest tests/unit/ backend/tests/unit/ \
            --ignore=tests/conftest.py \
            --ignore=backend/tests/conftest.py \
            --cov=applire \
            --cov-config=backend/.coveragerc \
            --cov-report=term-missing \
            --cov-report=html:backend/htmlcov \
            --cov-fail-under=70 \
            --junitxml=backend/test-results.xml \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/htmlcov/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: backend/test-results.xml
          retention-days: 30

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Unit Tests
          path: backend/test-results.xml
          reporter: 'java-junit'
          fail-on-error: false

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock requests

      - name: Create .env.dev from CI template
        run: cp .env.ci .env.dev

      - name: Start Docker services
        run: docker compose up -d --build

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          timeout 180 bash -c 'until curl -sf http://localhost:8001/health; do sleep 2; done'
          echo "Backend ready."

      - name: Run database migrations
        run: docker compose exec backend python -m alembic upgrade head

      - name: Run integration tests
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/unit \
            --junitxml=test-results.xml \
            -v \
            --tb=short

      - name: Tear down Docker services
        if: always()
        run: docker compose down -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: test-results.xml
          retention-days: 30

      - name: Publish integration test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Integration Tests
          path: test-results.xml
          reporter: 'java-junit'
          fail-on-error: false

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Node.js dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Create .env.dev from CI template
        run: cp .env.ci .env.dev

      - name: Start Docker services
        run: docker compose up -d --build

      - name: Wait for application to be ready
        run: |
          echo "Waiting for backend to be ready..."
          timeout 180 bash -c 'until curl -sf http://localhost:8001/health; do sleep 2; done'
          echo "Backend is ready!"
          echo "Waiting for frontend to be ready..."
          timeout 180 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'
          echo "Frontend is ready!"

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 30

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down Docker services
        if: always()
        run: docker compose down -v

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, e2e-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all test results
        if: always()
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Unit Tests | ${{ needs.backend-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Integration Tests | ${{ needs.backend-integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.backend-unit-tests.result }}" != "success" ] || \
             [ "${{ needs.backend-integration-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "**Test suite failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "**All tests passed!**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const unitTestsResult = '${{ needs.backend-unit-tests.result }}';
            const integrationTestsResult = '${{ needs.backend-integration-tests.result }}';
            const e2eTestsResult = '${{ needs.e2e-tests.result }}';
            const allPassed = unitTestsResult === 'success' &&
                              integrationTestsResult === 'success' &&
                              e2eTestsResult === 'success';
            const body = allPassed
              ? '**All tests passed!** This PR is ready to merge.'
              : [
                  '**Test failures detected**\n',
                  unitTestsResult !== 'success' ? `- Backend Unit Tests: ${unitTestsResult}` : '',
                  integrationTestsResult !== 'success' ? `- Backend Integration Tests: ${integrationTestsResult}` : '',
                  e2eTestsResult !== 'success' ? `- E2E Tests: ${e2eTestsResult}` : '',
                ].filter(Boolean).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
