name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'Solution/backend/requirements.txt'
      
      - name: Install backend dependencies
        working-directory: Solution/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock
      
      - name: Run unit tests with coverage
        working-directory: Solution/backend
        run: |
          pytest tests/unit/ \
            --cov=apliqa \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=75 \
            -v
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: Solution/backend/htmlcov/
          retention-days: 30

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: 'Solution/backend/requirements.txt'
      
      - name: Install backend dependencies
        working-directory: Solution/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock
      
      - name: Start Docker services
        working-directory: Solution
        run: |
          docker-compose up -d --build
      
      - name: Wait for services to be healthy
        working-directory: Solution
        run: |
          echo "Waiting for backend to be ready..."
          timeout 180 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done'
          echo "Backend is ready!"
      
      - name: Run integration tests
        working-directory: Solution
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            -v \
            --tb=short
      
      - name: Show Docker logs on failure
        if: failure()
        working-directory: Solution
        run: |
          docker-compose logs
      
      - name: Tear down Docker services
        if: always()
        working-directory: Solution
        run: |
          docker-compose down -v

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Solution/package-lock.json'
      
      - name: Install Node.js dependencies
        working-directory: Solution
        run: |
          npm ci
      
      - name: Install Playwright browsers
        working-directory: Solution
        run: |
          npx playwright install --with-deps chromium
      
      - name: Start Docker services
        working-directory: Solution
        run: |
          docker-compose up -d --build
      
      - name: Wait for application to be ready
        working-directory: Solution
        run: |
          echo "Waiting for backend to be ready..."
          timeout 180 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done'
          echo "Backend is ready!"
          echo "Waiting for frontend to be ready..."
          timeout 180 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'
          echo "Frontend is ready!"
      
      - name: Run Playwright E2E tests
        working-directory: Solution
        run: |
          npx playwright test
        env:
          CI: true
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Solution/playwright-report/
          retention-days: 30
      
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: Solution/test-results/
          retention-days: 30
      
      - name: Show Docker logs on failure
        if: failure()
        working-directory: Solution
        run: |
          docker-compose logs
      
      - name: Tear down Docker services
        if: always()
        working-directory: Solution
        run: |
          docker-compose down -v

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, e2e-tests]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "## Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Unit Tests: ${{ needs.backend-unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Integration Tests: ${{ needs.backend-integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.backend-unit-tests.result }}" != "success" ] || \
             [ "${{ needs.backend-integration-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "❌ Test suite failed. Please review the failures above." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          fi
